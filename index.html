<!DOCTYPE html>
<html lang="fa">
<head>
  <meta charset="UTF-8">
  <title>Cape Minecraft | Dragon Shop</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #001f3f, #0074D9);
      color: white;
      text-align: center;
    }

    /* انیمیشن ورود */
    .container {
      animation: fadeIn 1.5s ease-in-out;
      padding: 40px;
    }

    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(-20px);}
      to {opacity: 1; transform: translateY(0);}
    }

    img.profile {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      border: 4px solid white;
      margin-top: 40px;
    }

    h1 {
      font-size: 34px;
      margin: 10px 0;
    }

    p {
      font-size: 18px;
      opacity: 0.9;
    }

    .btn {
      display: inline-block;
      margin: 15px;
      padding: 12px 25px;
      background: white;
      color: #0074D9;
      text-decoration: none;
      border-radius: 10px;
      font-weight: bold;
      transition: 0.3s;
    }

    .btn:hover {
      transform: scale(1.1);
      background: #e6e6e6;
    }

    /* گالری */
    .gallery {
      margin-top: 40px;
    }

    .gallery img {
      width: 200px;
      height: 120px;
      margin: 10px;
      border-radius: 12px;
      border: 2px solid white;
      transition: 0.3s;
    }

    .gallery img:hover {
      transform: scale(1.05);
    }

    /* بخش دانلود */
    .download {
      margin-top: 40px;
      padding: 20px;
      background: rgba(255,255,255,0.1);
      border-radius: 15px;
      display: inline-block;
    }
  </style>
</head>

<body>

  <div class="container">

    <!-- پروفایل -->
    <img class="profile" src="profile.png" alt="profile">

    <h1>Cape Minecraft</h1>
    <p>🎮 Official Minecraft Cape & Resource Pack Channel</p>
    <p>Owner: Parham</p>

    <!-- دکمه‌ها -->
    <div>
      <a class="btn" href="https://rubika.ir/@Cape_Minecraft" target="_blank">ورود به کانال</a>
      <a class="btn" href="#download">دانلود ریسورس پک</a>
    </div>

    <!-- گالری -->
    <div class="gallery">
      <h2>📸 گالری</h2>
      <img src="img1.jpg">
      <img src="img2.jpg">
      <img src="img3.jpg">
    </div>

    <!-- دانلود -->
    <div id="download" class="download">
      <h2>📦 دانلود ریسورس پک</h2>
      <p>آخرین نسخه Cape Resource Pack</p>
      <a class="btn" href="cape-pack.zip" download>دانلود فایل</a>
    </div>

  </div>

</body>
</html>
