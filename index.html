<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dragon Shop</title>

<link rel="stylesheet" href="style.css">

<style>
/* ===== MODAL ONLY ===== */
.modal{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.85);
    backdrop-filter:blur(6px);
}

.modal-content{
    background:#0d1326;
    width:85%;
    max-width:700px;
    margin:8% auto;
    padding:20px;
    border-radius:15px;
    border:1px solid #ff3c00;
    box-shadow:0 0 40px #ff3c00, 0 0 25px #00bfff;
    color:white;
}

.close{
    float:left;
    cursor:pointer;
    font-size:22px;
    color:#ff3c00;
    font-weight:bold;
}

.card{
    background:#111a33;
    padding:15px;
    border-radius:12px;
    margin-top:15px;
}

img{
    width:100%;
    border-radius:10px;
    margin-top:10px;
}

.btn{
    display:inline-block;
    margin-top:10px;
    background:linear-gradient(90deg,#ff3c00,#00bfff);
    padding:10px 15px;
    border-radius:10px;
    color:white;
    text-decoration:none;
    font-weight:bold;
}
</style>
</head>

<body>

<header>
    <h1>🐉 Dragon Shop</h1>
    <p>فروشگاه حرفه‌ای ماینکرفت</p>
</header>

<div class="container">

<!-- 🔘 BUTTONS -->
<div class="nav" style="text-align:center; margin:20px;">
    <button onclick="openModal('skins')">👕 اسکین‌ها</button>
    <button onclick="openModal('capes')">🧢 کیپ‌ها</button>
    <button onclick="openModal('arts')">🎨 آرت‌ها</button>
    <button onclick="openModal('packs')">📦 ریسورس پک</button>
</div>

</div>

<!-- 📦 MODAL -->
<div id="modal" class="modal">
    <div class="modal-content">

        <span class="close" onclick="closeModal()">✖</span>

        <div id="modal-body"></div>

    </div>
</div>

<footer>
© Dragon Shop 2026
</footer>

<script>
function openModal(type){

    let content = "";

    if(type === "skins"){
        content = `
        <h2>👕 اسکین‌ها</h2>

        <div class="card">
            <h3>اسکین ویژه</h3>
            <img src="skin1.png">

            <p style="color:#00ffcc;font-weight:bold;">
                دانلود رایگان
            </p>
        </div>
        `;
    }

    if(type === "capes"){
        content = `
        <h2>🧢 کیپ‌ها</h2>

        <div class="card">
            <h3>کیپ اختصاصی</h3>
            <img src="cape1.png">

            <a class="btn" href="https://rubika.ir/Cape_Minecraft" target="_blank">
                خرید از روبیکا
            </a>
        </div>
        `;
    }

    if(type === "arts"){
        content = `
        <h2>🎨 آرت‌ها</h2>

        <div class="card">
            <h3>آرت ویژه</h3>
            <img src="art1.png">

            <a class="btn" href="https://rubika.ir/Cape_Minecraft" target="_blank">
                خرید از روبیکا
            </a>
        </div>
        `;
    }

    if(type === "packs"){
        content = `
        <h2>📦 ریسورس پک</h2>

        <div class="card">
            <h3>Reyan Faith Pack</h3>

            <a class="btn" href="reyan-faith.zip" download>
                دانلود ریسورس پک
            </a>
        </div>
        `;
    }

    document.getElementById("modal-body").innerHTML = content;
    document.getElementById("modal").style.display = "block";
}

function closeModal(){
    document.getElementById("modal").style.display = "none";
}
</script>

</body>
</html>
